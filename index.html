<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HallOfFame</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="bg-layer bg-layer-one" aria-hidden="true"></div>
    <div class="bg-layer bg-layer-two" aria-hidden="true"></div>

    <main class="page-shell">
      <section class="hero" aria-labelledby="heroTitle">
        <div class="hero-copy">
          <p class="eyebrow" id="heroEyebrow">명예의 작품들</p>
          <h1 id="heroTitle">HallOfFame</h1>
          <p id="heroDesc">좋아하는 영화를 한 곳에서 탐색하고 기록하세요.</p>
        </div>

        <article id="featuredPanel" class="featured-panel" aria-live="polite">
          <div class="featured-overlay"></div>
          <img id="featuredImage" class="featured-image" src="" alt="" loading="lazy" />
          <div class="featured-content">
            <p class="featured-kicker" id="featuredKicker">오늘의 큐레이션</p>
            <h2 id="featuredTitle"></h2>
            <p class="meta-line" id="featuredMeta"></p>
            <p id="featuredDescription"></p>
          </div>
        </article>
      </section>

      <section class="controls" aria-label="Catalog Controls">
        <div class="control-row">
          <div class="category-filter" aria-label="카테고리 필터">
            <button class="chip active" data-category="all" type="button">전체</button>
            <button class="chip" data-category="animation" type="button">애니</button>
            <!-- removed category -->
          </div>

          <div class="lang-switcher" aria-label="Language Switcher">
            <button class="lang-btn active" data-lang="ko" type="button">KO</button>
            <button class="lang-btn" data-lang="en" type="button">EN</button>
            <button class="lang-btn" data-lang="ja" type="button">JA</button>
          </div>
        </div>

        <div class="search-wrap">
          <label for="searchInput" id="searchLabel">검색</label>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="제목, 감독, 작가로 검색"
          />
        </div>
      </section>

      <section class="lane-section" aria-labelledby="laneSectionTitle">
        <h2 id="laneSectionTitle"></h2>
        <div id="laneRows" class="lane-rows"></div>
      </section>

      <section class="catalog" aria-labelledby="catalogTitle">
        <div class="catalog-header">
          <h2 id="catalogTitle"></h2>
          <div id="resultMeta" class="result-meta"></div>
        </div>
        <div id="cardGrid" class="card-grid" aria-live="polite"></div>
      </section>

      <footer class="site-footer">
        <p id="tmdbAttributionText"></p>
        <a id="tmdbAttributionLink" href="https://www.themoviedb.org/" target="_blank" rel="noopener noreferrer">TMDB</a>
      </footer>
    </main>

    <div id="detailModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="modal-panel">
        <button id="modalClose" class="modal-close" type="button" aria-label="Close">×</button>
        <img id="modalImage" src="" alt="" />
        <div class="modal-body">
          <span id="modalBadge" class="badge"></span>
          <h2 id="modalTitle"></h2>
          <p id="modalMeta" class="meta-line"></p>
          <p id="modalDescription" class="description"></p>
          <blockquote id="modalQuote" class="quote"></blockquote>
          <p id="modalSource" class="modal-source"></p>
        </div>
      </div>
    </div>
  </body>
</html>
